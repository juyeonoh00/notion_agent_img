      <rect x="-8" y="-70" width="16" height="70" rx="8" transform="rotate(0)"/>
      <rect x="-8" y="-70" width="16" height="70" rx="8" transform="rotate(30)"/>
      <rect x="-8" y="-70" width="16" height="70" rx="8" transform="rotate(60)"/>
      <rect x="-8" y="-70" width="16" height="70" rx="8" transform="rotate(90)"/>
      <rect x="-8" y="-70" width="16" height="70" rx="8" transform="rotate(120)"/>
      <rect x="-8" y="-70" width="16" height="70" rx="8" transform="rotate(150)"/>
      <rect x="-8" y="-70" width="16" height="70" rx="8" transform="rotate(180)"/>
      <rect x="-8" y="-70" width="16" height="70" rx="8" transform="rotate(210)"/>
      <rect x="-8" y="-70" width="16" height="70" rx="8" transform="rotate(240)"/>
      <rect x="-8" y="-70" width="16" height="70" rx="8" transform="rotate(270)"/>
      <rect x="-8" y="-70" width="16" height="70" rx="8" transform="rotate(300)"/>
      <rect x="-8" y="-70" width="16" height="70" rx="8" transform="rotate(330)"/>
