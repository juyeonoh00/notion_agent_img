<svg width="1000" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="step1Gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#312E81;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="step2Gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B21A8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D946EF;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="step3Gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#BE185D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F472B6;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="step4Gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0369A1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>

    <!-- Filters -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity="0.15"/>
    </filter>

    <filter id="cardShadow">
      <feDropShadow dx="0" dy="10" stdDeviation="25" flood-opacity="0.12"/>
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="800" fill="#FAFAFA"/>

  <!-- Title -->
  <text x="500" y="60" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#1F2937" text-anchor="middle">
    Notion API 설정 가이드
  </text>

  <!-- Step 1: Integration 생성 -->
  <g transform="translate(250, 120)">
    <!-- Number badge -->
    <circle cx="0" cy="60" r="20" fill="#312E81"/>
    <text x="0" y="67" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">1</text>

    <!-- Card -->
    <rect x="30" y="20" width="470" height="120" rx="18" fill="url(#step1Gradient)" filter="url(#cardShadow)"/>
    <rect x="32" y="22" width="466" height="116" rx="17" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

    <!-- Icon (Puzzle piece) -->
    <g transform="translate(70, 60)">
      <path d="M 0,10 L 10,10 L 10,0 C 10,-5 15,-5 15,0 L 15,10 L 25,10 C 30,10 30,15 25,15 L 15,15 L 15,25 L 10,25 L 10,15 L 0,15 Z"
            fill="white" opacity="0.95"/>
    </g>

    <!-- Text -->
    <text x="130" y="70" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="white">Integration 생성</text>
    <text x="130" y="100" font-family="Arial, sans-serif" font-size="14" fill="white" opacity="0.9">notion.so/my-integrations</text>
  </g>

  <!-- Arrow 1 -->
  <path d="M 500,260 L 500,290" stroke="#9CA3AF" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#9CA3AF"/>
    </marker>
  </defs>

  <!-- Step 2: API 키 복사 -->
  <g transform="translate(250, 310)">
    <!-- Number badge -->
    <circle cx="0" cy="60" r="20" fill="#6B21A8"/>
    <text x="0" y="67" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">2</text>

    <!-- Card -->
    <rect x="30" y="20" width="470" height="120" rx="18" fill="url(#step2Gradient)" filter="url(#cardShadow)"/>
    <rect x="32" y="22" width="466" height="116" rx="17" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

    <!-- Icon (Key with sparkle) -->
    <g transform="translate(70, 60)">
      <circle cx="0" cy="0" r="8" fill="none" stroke="white" stroke-width="2"/>
      <rect x="-2" y="7" width="4" height="12" fill="white"/>
      <rect x="-2" y="15" width="4" height="3" fill="white"/>
      <polygon points="15,-8 16,-5 19,-4 16,-3 15,0 14,-3 11,-4 14,-5" fill="white" opacity="0.9"/>
    </g>

    <!-- Text -->
    <text x="130" y="70" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="white">API 키 복사</text>
    <text x="130" y="100" font-family="Consolas, monospace" font-size="13" fill="white" opacity="0.9">secret_abc123def456...</text>
  </g>

  <!-- Arrow 2 -->
  <path d="M 500,450 L 500,480" stroke="#9CA3AF" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Step 3: 페이지 ID 확인 -->
  <g transform="translate(250, 500)">
    <!-- Number badge -->
    <circle cx="0" cy="60" r="20" fill="#BE185D"/>
    <text x="0" y="67" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">3</text>

    <!-- Card -->
    <rect x="30" y="20" width="470" height="120" rx="18" fill="url(#step3Gradient)" filter="url(#cardShadow)"/>
    <rect x="32" y="22" width="466" height="116" rx="17" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

    <!-- Icon (Document with search) -->
    <g transform="translate(70, 55)">
      <rect x="0" y="0" width="18" height="24" rx="2" fill="white"/>
      <line x1="4" y1="6" x2="14" y2="6" stroke="#BE185D" stroke-width="1.5"/>
      <line x1="4" y1="10" x2="14" y2="10" stroke="#BE185D" stroke-width="1.5"/>
      <line x1="4" y1="14" x2="10" y2="14" stroke="#BE185D" stroke-width="1.5"/>
      <circle cx="20" cy="18" r="5" fill="none" stroke="white" stroke-width="2"/>
      <line x1="23" y1="21" x2="27" y2="25" stroke="white" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- Text -->
    <text x="130" y="70" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="white">페이지 ID 확인</text>
    <text x="130" y="100" font-family="Arial, sans-serif" font-size="14" fill="white" opacity="0.9">URL에서 ID 복사</text>
  </g>

  <!-- Arrow 3 -->
  <path d="M 500,640 L 500,670" stroke="#9CA3AF" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Step 4: 권한 부여 -->
  <g transform="translate(250, 690)">
    <!-- Number badge -->
    <circle cx="0" cy="60" r="20" fill="#0369A1"/>
    <text x="0" y="67" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">4</text>

    <!-- Card -->
    <rect x="30" y="20" width="470" height="120" rx="18" fill="url(#step4Gradient)" filter="url(#cardShadow)"/>
    <rect x="32" y="22" width="466" height="116" rx="17" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

    <!-- Icon (Shield with checkmark) -->
    <g transform="translate(70, 55)">
      <path d="M 12,0 L 24,6 L 24,14 C 24,22 12,28 12,28 C 12,28 0,22 0,14 L 0,6 Z" fill="white"/>
      <path d="M 7,14 L 10,17 L 17,10" stroke="#0369A1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>

    <!-- Text -->
    <text x="130" y="70" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="white">권한 부여 완료</text>
    <text x="130" y="100" font-family="Arial, sans-serif" font-size="14" fill="white" opacity="0.9">Add connections 선택</text>
  </g>

  <!-- Completion checkmark -->
  <circle cx="500" cy="760" r="15" fill="#10B981"/>
  <path d="M 495,760 L 498,763 L 505,756" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
