<svg width="800" height="650" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FAFAFA"/>
      <stop offset="100%" style="stop-color:#F0F9FF"/>
    </linearGradient>

    <linearGradient id="step1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#10B981"/>
    </linearGradient>

    <linearGradient id="step2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EA580C"/>
      <stop offset="100%" style="stop-color:#F97316"/>
    </linearGradient>

    <linearGradient id="step3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#A855F7"/>
    </linearGradient>

    <linearGradient id="step4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>

    <linearGradient id="step5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DB2777"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>

    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="650" fill="url(#bg)"/>

  <!-- Title -->
  <text x="400" y="50" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#1F2937" text-anchor="middle">
    5분 퀵 스타트
  </text>
  <text x="400" y="80" font-family="Arial, sans-serif" font-size="16" fill="#6B7280" text-anchor="middle">
    간단한 5단계로 시작하세요
  </text>

  <!-- Step 1 -->
  <g transform="translate(250, 120)">
    <circle cx="30" cy="30" r="24" fill="url(#step1)" filter="url(#shadow)"/>
    <text x="30" y="38" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">1</text>

    <rect x="80" y="0" width="220" height="60" rx="12" fill="white" stroke="url(#step1)" stroke-width="2.5" filter="url(#shadow)"/>

    <text x="190" y="30" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="url(#step1)" text-anchor="middle">
      프로젝트 복제
    </text>
    <text x="190" y="48" font-family="Arial, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">
      git clone 또는 다운로드
    </text>
  </g>

  <!-- Arrow -->
  <g transform="translate(280, 190)">
    <line x1="0" y1="0" x2="0" y2="35" stroke="#D1D5DB" stroke-width="3"/>
    <polygon points="0,35 -5,25 5,25" fill="#D1D5DB"/>
  </g>

  <!-- Step 2 -->
  <g transform="translate(250, 235)">
    <circle cx="30" cy="30" r="24" fill="url(#step2)" filter="url(#shadow)"/>
    <text x="30" y="38" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">2</text>

    <rect x="80" y="0" width="220" height="60" rx="12" fill="white" stroke="url(#step2)" stroke-width="2.5" filter="url(#shadow)"/>

    <text x="190" y="30" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="url(#step2)" text-anchor="middle">
      패키지 설치
    </text>
    <text x="190" y="48" font-family="Arial, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">
      npm install
    </text>
  </g>

  <!-- Arrow -->
  <g transform="translate(280, 305)">
    <line x1="0" y1="0" x2="0" y2="35" stroke="#D1D5DB" stroke-width="3"/>
    <polygon points="0,35 -5,25 5,25" fill="#D1D5DB"/>
  </g>

  <!-- Step 3 -->
  <g transform="translate(250, 350)">
    <circle cx="30" cy="30" r="24" fill="url(#step3)" filter="url(#shadow)"/>
    <text x="30" y="38" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">3</text>

    <rect x="80" y="0" width="220" height="60" rx="12" fill="white" stroke="url(#step3)" stroke-width="2.5" filter="url(#shadow)"/>

    <text x="190" y="30" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="url(#step3)" text-anchor="middle">
      .env 설정
    </text>
    <text x="190" y="48" font-family="Arial, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">
      Notion API 키 입력
    </text>
  </g>

  <!-- Arrow -->
  <g transform="translate(280, 420)">
    <line x1="0" y1="0" x2="0" y2="35" stroke="#D1D5DB" stroke-width="3"/>
    <polygon points="0,35 -5,25 5,25" fill="#D1D5DB"/>
  </g>

  <!-- Step 4 -->
  <g transform="translate(250, 465)">
    <circle cx="30" cy="30" r="24" fill="url(#step4)" filter="url(#shadow)"/>
    <text x="30" y="38" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">4</text>

    <rect x="80" y="0" width="220" height="60" rx="12" fill="white" stroke="url(#step4)" stroke-width="2.5" filter="url(#shadow)"/>

    <text x="190" y="30" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="url(#step4)" text-anchor="middle">
      Claude Code 연동
    </text>
    <text x="190" y="48" font-family="Arial, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">
      MCP 설정 및 재시작
    </text>
  </g>

  <!-- Arrow -->
  <g transform="translate(280, 535)">
    <line x1="0" y1="0" x2="0" y2="35" stroke="#D1D5DB" stroke-width="3"/>
    <polygon points="0,35 -5,25 5,25" fill="#D1D5DB"/>
  </g>

  <!-- Step 5 -->
  <g transform="translate(250, 580)">
    <circle cx="30" cy="30" r="24" fill="url(#step5)" filter="url(#shadow)"/>
    <text x="30" y="38" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">5</text>

    <rect x="80" y="0" width="220" height="60" rx="12" fill="white" stroke="url(#step5)" stroke-width="2.5" filter="url(#shadow)"/>

    <text x="190" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="url(#step5)" text-anchor="middle">
      시작! 🎉
    </text>
    <text x="190" y="43" font-family="Arial, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">
      /summary 명령어로 문서화
    </text>
  </g>

  <!-- Decorative Elements -->
  <g opacity="0.1">
    <circle cx="100" cy="150" r="40" fill="url(#step1)"/>
    <circle cx="700" cy="250" r="50" fill="url(#step2)"/>
    <circle cx="120" cy="450" r="35" fill="url(#step4)"/>
    <circle cx="680" cy="550" r="45" fill="url(#step5)"/>
  </g>
</svg>
